name: mysql-master-slave

services:
  # 主节点 (写入节点) 端口：3306
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_REPL_USER: ${MYSQL_REPL_USER}
      MYSQL_REPL_PASSWORD: ${MYSQL_REPL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql-master.cnf:/etc/my.cnf
    networks:
      - mysql-net
    # 资源限制配置
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    # 自动创建同步账号（100% 正确，docker-compose 不会吞引号）
    command: |
      bash -c "
      # 启动MySQL
      docker-entrypoint.sh mysqld &

      # 智能等待MySQL启动
      until mysql -uroot -p\$MYSQL_ROOT_PASSWORD -e \"SELECT 1\" >/dev/null 2>&1; do
        sleep 1
        echo \" 等待mysql启动 \"
      done

      echo \" 创建复制账号 \"

      mysql -uroot -p\$MYSQL_ROOT_PASSWORD -e \"
        CREATE USER IF NOT EXISTS '${MYSQL_REPL_USER}'@'%' IDENTIFIED WITH mysql_native_password BY '${MYSQL_REPL_PASSWORD}';
        GRANT REPLICATION SLAVE ON *.* TO '${MYSQL_REPL_USER}'@'%';
        FLUSH PRIVILEGES;
      \"

      echo \" 复制账号创建完成 \"

      wait
      "
   
  # 从节点1 (只读) 端口：3307
  mysql-slave1:
    image: mysql:8.0
    container_name: mysql-slave1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave1-data:/var/lib/mysql
      - ./mysql-slave1.cnf:/etc/my.cnf
    networks:
      - mysql-net
    # 资源限制配置
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - mysql-master
    # 自动连接主库
    command: |
      bash -c "
      # 启动MySQL服务
      docker-entrypoint.sh mysqld &

      # 等待主节点和MySQL服务启动
      until mysql -uroot -hlocalhost -p\$MYSQL_ROOT_PASSWORD -e \"SELECT 1\" > /dev/null 2>&1; do
        sleep 5
        echo \" 等待主节点和MySQL服务启动 \"
      done

      echo \" 再等5秒,确保主节点启动完成 \"
      sleep 5

      echo \" 开始配置主从复制 \"

      # 配置主从复制
      mysql -uroot -p\$MYSQL_ROOT_PASSWORD -e \"
      STOP SLAVE; RESET SLAVE ALL;
      CHANGE REPLICATION SOURCE TO
      SOURCE_HOST=\\\"mysql-master\\\",
      SOURCE_USER=\\\"${MYSQL_REPL_USER}\\\",
      SOURCE_PASSWORD=\\\"${MYSQL_REPL_PASSWORD}\\\",
      SOURCE_AUTO_POSITION=1,
      SOURCE_SSL=1;
      START SLAVE;
      SET GLOBAL read_only = ON;
      SET GLOBAL super_read_only = ON;
      \"

      echo \" 主从复制配置完成 \"

      # 等待MySQL进程
      wait
      "

